name: iac-plan-apply

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'bicep/**'
      - 'platform-selector/**'
      - '.github/workflows/iac-plan-apply.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: Choose IaC platform
        required: true
        type: choice
        options:
          - terraform
          - bicep
        default: terraform
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      operation:
        description: Select operation mode
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read

concurrency:
  group: iac-${{ github.workflow }}-${{ github.event.inputs.platform || 'terraform' }}-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  terraform-pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        shell: bash
        run: |
          terraform fmt -check -recursive

      - name: Terraform Init and Validate (dev/stg/prd)
        shell: bash
        run: |
          for env in dev stg prd; do
            echo "Validating terraform/envs/${env}"
            cd terraform/envs/${env}
            terraform init -backend=false -input=false
            terraform validate
            cd - >/dev/null
          done

  bicep-pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bicep
        shell: bash
        run: |
          az bicep install
          az bicep version

      - name: Bicep Build Validation
        shell: bash
        run: |
          az bicep build --file bicep/main.bicep

  terraform-plan:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'terraform'
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        shell: bash
        run: |
          terraform fmt -check -recursive

      - name: Terraform Init (Plan)
        shell: bash
        run: |
          cd terraform/envs/${ENVIRONMENT}
          terraform init -input=false -backend-config backend-${ENVIRONMENT}.hcl

      - name: Terraform Validate
        shell: bash
        run: |
          cd terraform/envs/${ENVIRONMENT}
          terraform validate

      - name: Terraform Plan
        shell: bash
        run: |
          cd terraform/envs/${ENVIRONMENT}
          terraform plan -input=false -out=tfplan -var-file=terraform.tfvars
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: |
            terraform/envs/${{ env.ENVIRONMENT }}/tfplan
            terraform/envs/${{ env.ENVIRONMENT }}/tfplan.txt

  terraform-apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'terraform' && github.event.inputs.operation == 'apply'
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}
          path: terraform/envs/${{ env.ENVIRONMENT }}

      - name: Terraform Init (Apply)
        shell: bash
        run: |
          cd terraform/envs/${ENVIRONMENT}
          terraform init -input=false -backend-config backend-${ENVIRONMENT}.hcl

      - name: Terraform Apply Saved Plan
        shell: bash
        run: |
          cd terraform/envs/${ENVIRONMENT}
          terraform apply -input=false tfplan

  bicep-what-if:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'bicep'
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Bicep
        shell: bash
        run: |
          az bicep install
          az bicep version

      - name: Bicep What-If
        shell: bash
        run: |
          az deployment sub what-if \
            --name iac-${ENVIRONMENT}-whatif-${GITHUB_RUN_ID} \
            --location westeurope \
            --template-file bicep/main.bicep \
            --parameters @bicep/parameters/${ENVIRONMENT}.parameters.json

  bicep-apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'bicep' && github.event.inputs.operation == 'apply'
    needs: bicep-what-if
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Bicep
        shell: bash
        run: |
          az bicep install

      - name: Bicep Apply
        shell: bash
        run: |
          az deployment sub create \
            --name iac-${ENVIRONMENT}-apply-${GITHUB_RUN_ID} \
            --location westeurope \
            --template-file bicep/main.bicep \
            --parameters @bicep/parameters/${ENVIRONMENT}.parameters.json
